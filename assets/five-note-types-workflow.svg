  <text x="600" y="68" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF">&#20116;&#39006;&#31558;&#35352;&#183;&#19968;&#24373;&#22320;&#22294;&#183;&#20195;&#29702;&#20840;&#27969;&#31243;</text>

  <!-- Card helper: x positions 48, 268, 488, 708, 928 -->

  <!-- Step 1 Property -->
  <rect x="50" y="150" width="196" height="196" rx="16" fill="#E2E8F0" opacity="0.5"/>
  <rect x="48" y="148" width="200" height="200" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="148" cy="198" r="28" fill="#0369A1"/>
  <use href="#icon-property" x="136" y="186" width="24" height="24"/>
  <text x="148" y="252" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="18" font-weight="700" fill="#0F172A">&#29289;&#26989;&#36039;&#26009;</text>
  <text x="148" y="278" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#30436;&#28304;&#30740;&#31350;</text>
  <text x="148" y="298" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#22823;&#24264;&#36039;&#26009;</text>
  <rect x="118" y="314" width="60" height="22" rx="11" fill="#E0F2FE"/>
  <text x="148" y="329" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#0369A1">1</text>

