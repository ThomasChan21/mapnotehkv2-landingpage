<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <title>MapNote HK - Five note types agent workflow</title>
  <desc>Agent workflow: Property, Site visit, Client, Offer, Transaction</desc>

  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#228B3B"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748B"/>
    </marker>
    <!-- Simple inline icons (no external fonts) -->
    <symbol id="icon-property" viewBox="0 0 24 24">
      <path fill="#FFFFFF" d="M4 20V9l8-5 8 5v11H4zm2-2h4v-5H6v5zm6 0h4v-8h-4v8z"/>
    </symbol>
    <symbol id="icon-visited" viewBox="0 0 24 24">
      <path fill="#FFFFFF" d="M12 5C8.1 5 5 8.1 5 12s3.1 7 7 7 7-3.1 7-7-3.1-7-7-7zm0 11c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4zm0-6.5c-1.4 0-2.5 1.1-2.5 2.5S10.6 14.5 12 14.5s2.5-1.1 2.5-2.5S13.4 9.5 12 9.5z"/>
    </symbol>
    <symbol id="icon-client" viewBox="0 0 24 24">
      <path fill="#FFFFFF" d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/>
    </symbol>
    <symbol id="icon-offer" viewBox="0 0 24 24">
      <path fill="#FFFFFF" d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58s1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/>
    </symbol>
    <symbol id="icon-transaction" viewBox="0 0 24 24">
      <path fill="#FFFFFF" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/>
    </symbol>
  </defs>

