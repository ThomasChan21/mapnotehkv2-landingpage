  <line x1="470" y1="248" x2="486" y2="248" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 Client -->
  <rect x="490" y="150" width="196" height="196" rx="16" fill="#E2E8F0" opacity="0.5"/>
  <rect x="488" y="148" width="200" height="200" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="588" cy="198" r="28" fill="#4F46E5"/>
  <use href="#icon-client" x="576" y="186" width="24" height="24"/>
  <text x="588" y="252" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="18" font-weight="700" fill="#0F172A">&#23458;&#25142;&#38656;&#27714;</text>
  <text x="588" y="278" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#36023;&#23478;&#31199;&#23458;</text>
  <text x="588" y="298" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#38928;&#31639;&#20559;&#22909;</text>
  <rect x="558" y="314" width="60" height="22" rx="11" fill="#EEF2FF"/>
