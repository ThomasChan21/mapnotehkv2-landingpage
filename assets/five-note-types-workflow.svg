  <rect x="268" y="148" width="200" height="200" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="368" cy="198" r="28" fill="#228B3B"/>
  <use href="#icon-visited" x="356" y="186" width="24" height="24"/>
  <text x="368" y="252" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="18" font-weight="700" fill="#0F172A">&#23526;&#22320;&#32771;&#23519;</text>
  <text x="368" y="278" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#30475;&#27155;&#35352;&#37636;</text>
  <text x="368" y="298" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#29694;&#22580;&#30456;&#29255;</text>
  <rect x="338" y="314" width="60" height="22" rx="11" fill="#DCFCE7"/>
  <text x="368" y="329" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#228B3B">2</text>

