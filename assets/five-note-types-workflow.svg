  <rect x="710" y="150" width="196" height="196" rx="16" fill="#E2E8F0" opacity="0.5"/>
  <rect x="708" y="148" width="200" height="200" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="808" cy="198" r="28" fill="#0D9488"/>
  <use href="#icon-offer" x="796" y="186" width="24" height="24"/>
  <text x="808" y="252" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="18" font-weight="700" fill="#0F172A">&#22577;&#20729;&#35352;&#37636;</text>
  <text x="808" y="278" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#20986;&#20729;&#36996;&#20729;</text>
  <text x="808" y="298" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#35696;&#20729;&#36942;&#31243;</text>
  <rect x="778" y="314" width="60" height="22" rx="11" fill="#CCFBF1"/>
  <text x="808" y="329" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#0D9488">4</text>

  <!-- Arrow 4-5 -->
  <line x1="910" y1="248" x2="926" y2="248" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

