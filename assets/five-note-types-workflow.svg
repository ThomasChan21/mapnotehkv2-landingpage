  <rect x="930" y="150" width="196" height="196" rx="16" fill="#E2E8F0" opacity="0.5"/>
  <rect x="928" y="148" width="200" height="200" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="1028" cy="198" r="28" fill="#B45309"/>
