  <text x="1028" y="252" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="18" font-weight="700" fill="#0F172A">&#25104;&#20132;&#35352;&#37636;</text>
  <text x="1028" y="278" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#36067;&#36067;&#25104;&#20132;</text>
  <text x="1028" y="298" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#64748B">&#31199;&#36067;&#25104;&#20132;</text>
  <rect x="998" y="314" width="60" height="22" rx="11" fill="#FEF3C7"/>
  <text x="1028" y="329" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#B45309">5</text>

  <!-- Footer -->
  <text x="600" y="392" text-anchor="middle" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="500" fill="#64748B">&#20195;&#29702;&#26381;&#21209;&#65292;&#22320;&#22294;&#35352;&#37636; &#183; MapNote HK</text>
